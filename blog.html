<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Blog — NYC Digital Modernization</title>
<meta name="description" content="Notes and updates from the NYC Digital Modernization project — telling the story of what's possible when the city's public data becomes programmable and agent-native.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='46' fill='%233098d8'/%3E%3C/svg%3E">
<link rel="stylesheet" href="assets/style.css">
<style>
.post{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:22px 0;background:var(--bg-card)}
.post .banner{display:block;width:100%;border-bottom:1px solid var(--border);background:#fff}
.post .body{padding:16px 18px}
.post h2{font-size:1.3rem;margin:0 0 .2em}
.post .meta{font-size:.82rem;color:var(--fg-soft);margin-bottom:.5em}
.post .sum{color:var(--fg-soft)}
</style>
<!--seo:start-->
<link rel="canonical" href="https://nyc.apievangelist.com/blog.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="NYC — Digital Modernization">
<meta property="og:title" content="Blog — NYC Digital Modernization">
<meta property="og:description" content="Notes and updates from the NYC Digital Modernization project — telling the story of what&#x27;s possible when the city&#x27;s public data becomes programmable and agent-native.">
<meta property="og:url" content="https://nyc.apievangelist.com/blog.html">
<meta property="og:image" content="https://nyc.apievangelist.com/assets/social.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Blog — NYC Digital Modernization">
<meta name="twitter:description" content="Notes and updates from the NYC Digital Modernization project — telling the story of what&#x27;s possible when the city&#x27;s public data becomes programmable and agent-native.">
<meta name="twitter:image" content="https://nyc.apievangelist.com/assets/social.png">
<!--seo:end-->
</head>
<body>
<div id="nav"></div>
<div class="dhead"><div class="wrap">
  <div class="eyebrow" style="color:var(--brand-dark);font-weight:600;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase">Project blog</div>
  <h1>Blog</h1>
  <p class="muted" style="max-width:72ch">Notes and updates from the NYC — Digital Modernization project. Telling the story of what's possible when the city's public data becomes not just accessible, but programmable and intelligent.</p>
  <div class="stats" style="margin-top:14px" id="stats"></div>
</div></div>
<div class="wrap" id="posts"></div>
<div id="footer"></div>
<script src="assets/app.js"></script>
<script>
(async function(){
  document.getElementById("nav").innerHTML=navBar();
  document.getElementById("footer").innerHTML=footer();
  const B=await getJSON("data/blog.json");
  const posts=[...B.posts].sort((a,b)=>(a.date<b.date?1:a.date>b.date?-1:0));
  document.getElementById("stats").innerHTML=`<div class="stat"><b>${posts.length}</b><span>post${posts.length===1?"":"s"}</span></div>`;
  const fmt=d=>{try{return new Date(d+"T12:00:00").toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});}catch(e){return d;}};
  document.getElementById("posts").innerHTML=posts.map(p=>`
    <div class="post">
      ${p.image?`<a href="blog/${esc(p.slug)}.html"><img class="banner" src="${esc(p.image)}" alt=""></a>`:""}
      <div class="body">
        <h2><a href="blog/${esc(p.slug)}.html">${esc(p.title)}</a></h2>
        <div class="meta">${fmt(p.date)}${p.author?" · "+esc(p.author):""}</div>
        <p class="sum">${esc(p.summary||"")}</p>
        <a href="blog/${esc(p.slug)}.html">Read the post →</a>
      </div>
    </div>`).join("");
})();
</script>
</body>
</html>
