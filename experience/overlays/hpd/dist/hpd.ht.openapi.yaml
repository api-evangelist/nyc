openapi: 3.1.0
info:
  title: API NYC HPD (pwopoze)
  version: 0.1.0
  summary: One owned, documented, agent-native API for the NYC Department of Housing Preservation & Development — exposing the building/violation/complaint/registration/litigation record that already flows through HPD's private backend, plus the net-new affordable-housing lottery application write.
  description: 'Proposed API-first surface for NYC Housing Preservation & Development (HPD), from the NYC Modernization low-hanging-fruit assessment of nyc.gov/hpd, HPD Online, and NYC Housing Connect.


    HPD is a distinct pattern in this project: an owned backend REST API **already exists** — `mspwvw-hpdleov3.nyc.gov/hpdonline.api/1.0/api` — but it is **private and undocumented**, serving only the HPD Online Angular SPA. The public, machine-readable surface is instead **47 flattened NYC Open Data datasets** (Housing Maintenance Code Violations, Complaints & Problems, Registrations, Housing Litigations, Affordable Housing Production, Local Law 44…). The transactional side — applying to an affordable-housing lottery — sits in a **separate closed silo**, NYC Housing Connect, with no public API at all.


    This contract **exposes** the existing backend as one documented, resource-oriented, agent-native API (buildings, violations, complaints, registrations, litigation, affordable-housing production) and adds the one net-new write workflow: submitting a **housing lottery application**.


    Every resource schema is an individual JSON Schema file referenced by `$ref`. See `../schemas/`, `../crosswalk.md`, `../tech-stack.md`, and `../apis-observed.md`.'
  contact:
    name: API Evangelist — NYC Modernization
    url: https://github.com/api-evangelist/nyc
  x-language: ht
  x-text-direction: ltr
servers:
- url: https://api.hpd.nyc.gov/v1
  description: Proposed production host (illustrative)
tags:
- name: Buildings
  description: Residential buildings under HPD jurisdiction — the spine.
- name: Violations
  description: Housing Maintenance Code violations.
- name: Complaints
  description: Tenant complaints and their problems.
- name: Registrations
  description: Annual owner/property registrations and contacts.
- name: Litigation
  description: HPD housing litigation cases.
- name: AffordableHousing
  description: Affordable-housing production (Housing New York units).
- name: Lottery
  description: NYC Housing Connect affordable-housing lottery applications (read + write). The net-new surface.
paths:
  /buildings:
    get:
      operationId: listBuildings
      summary: Search buildings under HPD jurisdiction
      tags:
      - Buildings
      parameters:
      - $ref: '#/components/parameters/borough'
      - name: bbl
        in: query
        schema:
          type: string
      - name: bin
        in: query
        schema:
          type: string
      - name: block
        in: query
        schema:
          type: string
      - name: lot
        in: query
        schema:
          type: string
      - name: councilDistrict
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 51
      - $ref: '#/components/parameters/q'
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/perPage'
      responses:
        '200':
          description: A page of buildings.
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PageMeta'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: ../schemas/building.json
  /buildings/{buildingId}:
    get:
      operationId: getBuilding
      summary: Get a building by HPD Building ID
      tags:
      - Buildings
      parameters:
      - $ref: '#/components/parameters/buildingId'
      responses:
        '200':
          description: The building.
          content:
            application/json:
              schema:
                $ref: ../schemas/building.json
        '404':
          $ref: '#/components/responses/NotFound'
  /buildings/{buildingId}/violations:
    get:
      operationId: getBuildingViolations
      summary: List a building's violations
      tags:
      - Buildings
      - Violations
      parameters:
      - $ref: '#/components/parameters/buildingId'
      - name: status
        in: query
        schema:
          type: string
          enum:
          - Open
          - Close
      - name: class
        in: query
        schema:
          type: string
          enum:
          - A
          - B
          - C
          - I
      responses:
        '200':
          description: The building's violations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: ../schemas/violation.json
  /buildings/{buildingId}/complaints:
    get:
      operationId: getBuildingComplaints
      summary: List a building's complaints
      tags:
      - Buildings
      - Complaints
      parameters:
      - $ref: '#/components/parameters/buildingId'
      responses:
        '200':
          description: The building's complaints.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: ../schemas/complaint.json
  /violations:
    get:
      operationId: listViolations
      summary: Search Housing Maintenance Code violations
      tags:
      - Violations
      parameters:
      - name: buildingId
        in: query
        schema:
          type: string
      - name: bbl
        in: query
        schema:
          type: string
      - name: class
        in: query
        schema:
          type: string
          enum:
          - A
          - B
          - C
          - I
      - name: status
        in: query
        schema:
          type: string
          enum:
          - Open
          - Close
      - name: from
        in: query
        description: Filter by NOV issued date (inclusive).
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/perPage'
      responses:
        '200':
          description: A page of violations.
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PageMeta'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: ../schemas/violation.json
  /violations/{violationId}:
    get:
      operationId: getViolation
      summary: Get a violation by ID
      tags:
      - Violations
      parameters:
      - name: violationId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: The violation.
          content:
            application/json:
              schema:
                $ref: ../schemas/violation.json
        '404':
          $ref: '#/components/responses/NotFound'
  /complaints:
    get:
      operationId: listComplaints
      summary: Search complaints and problems
      tags:
      - Complaints
      parameters:
      - name: buildingId
        in: query
        schema:
          type: string
      - name: status
        in: query
        schema:
          type: string
          enum:
          - OPEN
          - CLOSE
      - name: majorCategory
        in: query
        schema:
          type: string
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/perPage'
      responses:
        '200':
          description: A page of complaints.
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PageMeta'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: ../schemas/complaint.json
    post:
      operationId: createComplaint
      summary: File a maintenance complaint against a building
      description: Net-new write path — an API for filing an HPD maintenance complaint (today only possible via 311 or the web UI).
      tags:
      - Complaints
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/complaint.json
      responses:
        '201':
          description: Complaint filed.
          content:
            application/json:
              schema:
                $ref: ../schemas/complaint.json
        '400':
          $ref: '#/components/responses/BadRequest'
  /complaints/{complaintId}:
    get:
      operationId: getComplaint
      summary: Get a complaint (with problems) by ID
      tags:
      - Complaints
      parameters:
      - name: complaintId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: The complaint.
          content:
            application/json:
              schema:
                $ref: ../schemas/complaint.json
        '404':
          $ref: '#/components/responses/NotFound'
  /registrations:
    get:
      operationId: listRegistrations
      summary: Search property/owner registrations
      tags:
      - Registrations
      parameters:
      - name: buildingId
        in: query
        schema:
          type: string
      - name: bbl
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/borough'
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/perPage'
      responses:
        '200':
          description: A page of registrations.
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PageMeta'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: ../schemas/registration.json
  /registrations/{registrationId}:
    get:
      operationId: getRegistration
      summary: Get a registration (with contacts) by ID
      tags:
      - Registrations
      parameters:
      - name: registrationId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: The registration.
          content:
            application/json:
              schema:
                $ref: ../schemas/registration.json
        '404':
          $ref: '#/components/responses/NotFound'
  /litigation:
    get:
      operationId: listLitigation
      summary: Search HPD housing litigation cases
      tags:
      - Litigation
      parameters:
      - name: buildingId
        in: query
        schema:
          type: string
      - name: caseType
        in: query
        schema:
          type: string
      - name: caseStatus
        in: query
        schema:
          type: string
          enum:
          - PENDING
          - CLOSED
      - name: findingOfHarassment
        in: query
        schema:
          type: string
          enum:
          - true
          - false
          - Pending
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/perPage'
      responses:
        '200':
          description: A page of litigation cases.
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PageMeta'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: ../schemas/litigation.json
  /litigation/{litigationId}:
    get:
      operationId: getLitigation
      summary: Get a litigation case by ID
      tags:
      - Litigation
      parameters:
      - name: litigationId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: The litigation case.
          content:
            application/json:
              schema:
                $ref: ../schemas/litigation.json
        '404':
          $ref: '#/components/responses/NotFound'
  /affordable-housing-projects:
    get:
      operationId: listAffordableHousingProjects
      summary: Chèche pwodiksyon lojman abòdab (inite Housing New York)
      tags:
      - AffordableHousing
      parameters:
      - $ref: '#/components/parameters/borough'
      - name: councilDistrict
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 51
      - name: reportingConstructionType
        in: query
        schema:
          type: string
      - name: from
        in: query
        description: Filter by project completion date (inclusive).
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      - $ref: '#/components/parameters/q'
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/perPage'
      responses:
        '200':
          description: A page of affordable-housing projects.
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PageMeta'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: ../schemas/affordable-housing-project.json
  /affordable-housing-projects/{projectId}:
    get:
      operationId: getAffordableHousingProject
      summary: Jwenn yon pwojè lojman abòdab pa ID
      tags:
      - AffordableHousing
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: The project.
          content:
            application/json:
              schema:
                $ref: ../schemas/affordable-housing-project.json
        '404':
          $ref: '#/components/responses/NotFound'
  /lottery-applications:
    get:
      operationId: listLotteryApplications
      summary: Lis aplikasyon lotri fwaye ki otantifye a
      tags:
      - Lottery
      security:
      - bearerAuth: []
      responses:
        '200':
          description: The applications.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: ../schemas/housing-lottery-application.json
    post:
      operationId: createLotteryApplication
      summary: Aplike pou yon lotri lojman abòdab (Housing Connect)
      description: The net-new write surface — an API for submitting an NYC Housing Connect affordable-housing lottery application.
      tags:
      - Lottery
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/housing-lottery-application.json
      responses:
        '201':
          description: Application submitted.
          content:
            application/json:
              schema:
                $ref: ../schemas/housing-lottery-application.json
        '400':
          $ref: '#/components/responses/BadRequest'
  /lottery-applications/{applicationId}:
    get:
      operationId: getLotteryApplication
      summary: Jwenn yon aplikasyon lotri
      tags:
      - Lottery
      security:
      - bearerAuth: []
      parameters:
      - name: applicationId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: The application.
          content:
            application/json:
              schema:
                $ref: ../schemas/housing-lottery-application.json
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Building:
      $ref: ../schemas/building.json
    HousingMaintenanceViolation:
      $ref: ../schemas/violation.json
    Complaint:
      $ref: ../schemas/complaint.json
    Registration:
      $ref: ../schemas/registration.json
    LitigationCase:
      $ref: ../schemas/litigation.json
    AffordableHousingProject:
      $ref: ../schemas/affordable-housing-project.json
    HousingLotteryApplication:
      $ref: ../schemas/housing-lottery-application.json
    PageMeta:
      type: object
      properties:
        meta:
          type: object
          properties:
            page:
              type: integer
            perPage:
              type: integer
            total:
              type: integer
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
      - error
  parameters:
    borough:
      name: borough
      in: query
      schema:
        type: string
        enum:
        - Manhattan
        - Bronx
        - Brooklyn
        - Queens
        - Staten Island
    buildingId:
      name: buildingId
      in: path
      required: true
      schema:
        type: string
    q:
      name: q
      in: query
      description: Free-text search (address / name).
      schema:
        type: string
    page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    perPage:
      name: perPage
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
  responses:
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
